<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopee Sign Up</title>
  <link rel="stylesheet" href="signlogstyles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Add Font Awesome CDN for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        <img src="https://via.placeholder.com/24" alt="Ecocycle logo">
        <span>Ecocycle</span>
      </div>
      <a href="#" class="help">Need help?</a>
    </div>
  </header>

  <main class="container">
    <div class="split left">
      <div class="brand">
        <div class="brand-logo">
          <img src="https://via.placeholder.com/64" alt="Ecocycle Marketplace icon">
        </div>
        <h1>Ecocycle Marketplace</h1>
        <p>The leading online platform for sustainable<br>and eco-friendly products</p>
      </div>
    </div>


    <div class="split right">
      <div class="card">
        <h2>Sign Up</h2>
        <form action="login.html" method="post">
          <input type="text" placeholder="Full Name">
          <input type="text" placeholder="Username">
          <input type="tel" placeholder="Phone Number">
          <input type="text" placeholder="Email">
          <input type="password" placeholder="Password">
          <button type="submit" class="btn-next">SIGN UP</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <div class="social-login">
          <!-- Facebook button with icon -->
          <button class="btn-social fb">
            <i class="fab fa-facebook-f"></i> Facebook
          </button>
          <!-- Google button with icon -->
          <button class="btn-social google">
            <i class="fab fa-google"></i> Google
          </button>
        </div>

        <p class="footer-text">
          By signing up, you agree to Shopee’s 
          <a href="#">Terms of Service</a> &amp; 
          <a href="#">Privacy Policy</a>.
        </p>
        <p class="footer-text">
          Have an account? <a href="login.html">Log In</a>
        </p>
      </div>
    </div>
  </main>
</body>
</html>
